# File: .github/workflows/flutter_build.yml
name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Add swap (Android build is memory-hungry on 7GB runners)
        # Firebase + Flutter's DEX merge (mergeDexRelease) pushes the
        # ubuntu-latest runner past 7GB RAM and gets OOM-killed.
        # Add 6GB of additional swap on /mnt (Azure ephemeral disk) —
        # the default /swapfile is already in use and can't be resized.
        run: |
          sudo fallocate -l 6G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (lint)
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: |
          if [ -d test ] && [ -n "$(ls -A test 2>/dev/null)" ]; then
            flutter test --no-pub
          else
            echo "No tests to run — skipping."
          fi

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS (no signing)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/*.app
