name: grabmeadeal_final
description: A personal savings engine for finding and tracking deals.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core & Services
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5

  # Google Sign-In
  google_sign_in: ^6.3.0

  # Location & Geofencing
  geolocator: ^11.1.0
  flutter_local_notifications: ^17.2.4

  # UI Components
  cached_network_image: ^3.4.0
  fl_chart: ^0.66.2

  # Utility
  provider: ^6.1.1
  url_launcher: ^6.1.14
  intl: ^0.18.1
  shared_preferences: ^2.2.2

  # Flutter essentials
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/images/
