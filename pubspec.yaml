name: grabmeadeal_final
description: A new Flutter project for deal discovery and wishlist management.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.0.0
  firebase_messaging: ^16.0.0
  google_sign_in: ^6.2.2

  # Location & Notifications
  geolocator: ^14.0.2
  flutter_local_notifications: ^19.4.0

  # Serialization
  json_annotation: ^4.9.0

  # UI & State Management
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.0
  url_launcher: ^6.3.1
  intl: ^0.20.2

  # Charts & Visualization
  fl_chart: ^1.0.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/sounds/
    - assets/logo/
